# Render Blueprint — Verdalis Foods API
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: verdalis-foods-api
    runtime: php
    rootDir: Back
    buildCommand: chmod +x scripts/render-build.sh && ./scripts/render-build.sh
    startCommand: chmod +x scripts/render-start.sh && ./scripts/render-start.sh
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: warning
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_URL
        sync: false
      - key: SHIPPER_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SANCTUM_STATEFUL_DOMAINS
        sync: false
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: verdalis-foods-db
          property: connectionString
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SUCCESS_URL
        sync: false
      - key: STRIPE_CANCEL_URL
        sync: false

databases:
  - name: verdalis-foods-db
    plan: free
    databaseName: verdalis
    user: verdalis
